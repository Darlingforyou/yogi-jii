<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unlock Aalu's Heart ❤️</title>

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#1a0f14,#3b1f2b);
color:white;
text-align:center;
overflow-x:hidden;
}

/* TITLE */

h1{
margin-top:20px;
color:#ff9eb5;
}

/* STATS */

.stats{
display:flex;
justify-content:center;
gap:25px;
margin-top:10px;
font-size:16px;
}

/* TIMER */

.timer{
font-size:18px;
margin-top:10px;
color:#ffd1dc;
}

/* PROGRESS */

.progress-container{
width:80%;
height:12px;
background:#444;
margin:15px auto;
border-radius:20px;
overflow:hidden;
}

.progress-bar{
height:100%;
width:0%;
background:#ff6f91;
transition:0.3s;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(4,80px);
gap:12px;
justify-content:center;
margin-top:20px;
}

/* CARD */

.card{
width:80px;
height:80px;
background:#ff9eb5;
border-radius:15px;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
cursor:pointer;
transition:0.4s;
}

.card.matched{
background:#ff6f91;
cursor:default;
}

/* MESSAGE */

.message{
margin-top:15px;
font-size:16px;
color:#ffd1dc;
font-weight:bold;
}

/* CONFETTI */

.confetti{
position:fixed;
top:0;
font-size:24px;
animation:fall linear forwards;
}

@keyframes fall{
0%{transform:translateY(-50px);}
100%{transform:translateY(110vh);}
}

/* MOBILE */

@media(max-width:500px){

.grid{
grid-template-columns:repeat(4,65px);
}

.card{
width:65px;
height:65px;
font-size:24px;
}

}
/* POPUP STYLE */

.popup-overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:flex;
align-items:center;
justify-content:center;
z-index:999;
}

.popup-box{
background:#2b1620;
padding:25px;
border-radius:15px;
text-align:center;
width:300px;
box-shadow:0 0 15px #ff6f91;
}

.popup-box h2{
color:#ff9eb5;
margin-bottom:15px;
}

.popup-btn{
margin:8px;
padding:10px 18px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:15px;
background:#ff6f91;
color:white;
transition:0.3s;
}

.popup-btn:hover{
background:#ff3f6c;
}
</style>
</head>

<body>

<h1>Unlock Aalu's Heart ❤️</h1>

<div class="stats">
<div>🎯 Moves: <span id="moves">0</span></div>
<div>⭐ Level: <span id="level">1</span></div>
</div>

<div class="timer" id="timerBox" style="display:none;">
⏳ Time Left: <span id="time">60</span>s
</div>

<div class="progress-container">
<div class="progress-bar" id="progress"></div>
</div>

<div class="grid" id="grid"></div>

<div class="message" id="msg"></div>

<div id="popupContainer"></div>

<!-- MUSIC -->

<audio id="bgMusic" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<audio id="flipSound">
<source src="https://assets.mixkit.co/sfx/preview/mixkit-select-click-1109.mp3">
</audio>

<script>

/* START MUSIC */

document.body.addEventListener("click",()=>{

document.getElementById("bgMusic").play();

},{once:true});

/* VARIABLES */

let level=1;
let moves=0;
let matches=0;
let first=null;
let second=null;
let lock=false;
let timeLeft=60;
let timer;


/* LOVE MESSAGES */

const loveMessages=[
"You make my world brighter ❤️",
"My heart beats only for Aalu 💓",
"You are my forever happiness 🥰",
"My favorite person in the world 🌍",
"You complete my life 💖",
"You are my everything ❤️"
];

/* EMOJIS */

let emojis=[
"❤️","💖","💕","💘",
"🌹","🥰","😍","💑"
];

/* POPUP FLOW */

function showPopup1(){

let popup = `
<div class="popup-overlay">
<div class="popup-box">

<h2>Do you want to play the game? ❤️</h2>

<button class="popup-btn"
onclick="showPopup2()">
Yes
</button>

<button class="popup-btn"
onclick="showPopup2()">
Yes 😄
</button>

</div>
</div>
`;

document.getElementById("popupContainer").innerHTML = popup;

}


function showPopup2(){

let popup = `
<div class="popup-overlay">
<div class="popup-box">

<h2>⚠️ Game is HARD! <br>
Do you still want to play?</h2>

<button class="popup-btn"
onclick="showPopup3()">
Yes
</button>

<button class="popup-btn"
onclick="goToMain()">
No
</button>

</div>
</div>
`;

document.getElementById("popupContainer").innerHTML = popup;

}


function showPopup3(){

let popup = `
<div class="popup-overlay">
<div class="popup-box">

<h2>All The Best ❤️🔥</h2>

<button class="popup-btn"
onclick="startRealGame()">
Start Game
</button>

</div>
</div>
`;

document.getElementById("popupContainer").innerHTML = popup;

}


function startRealGame(){

document.getElementById("popupContainer").innerHTML = "";

startGame();

}


function goToMain(){

window.location.href="main.html";

} 

/* LEVEL COMPLETE POPUP */

function showLevelCompletePopup(){

let popup = `
<div class="popup-overlay">
<div class="popup-box">

<h2>
Level 1 Complete ❤️ <br><br>
Level 2 Unlocked 🔥 <br>
Now prove your love faster ⏳
</h2>

<button class="popup-btn"
onclick="startLevel2()">
Start Level 2
</button>

</div>
</div>
`;

document.getElementById("popupContainer").innerHTML = popup;

}


function startLevel2(){

document.getElementById("popupContainer").innerHTML = "";

/* SET LEVEL 2 */

timeLeft=45;

document.getElementById("time").innerText=timeLeft;

document.getElementById("timerBox").style.display="block";

/* START TIMER */

clearInterval(timer);

timer=setInterval(()=>{

timeLeft--;

document.getElementById("time").innerText=timeLeft;

if(timeLeft<=0){

alert("Time's up! Try again ❤️");

location.reload();

}

},1000);

/* START GAME */

startGame();

}

function startGame(){

let cards=[...emojis,...emojis];

cards.sort(()=>Math.random()-0.5);

const grid=document.getElementById("grid");

grid.innerHTML="";

cards.forEach(symbol=>{

let card=document.createElement("div");

card.classList.add("card");

card.innerText="❓";

card.dataset.value=symbol;

card.onclick=function(){

if(lock || card.classList.contains("matched")) return;

document.getElementById("flipSound").play();

card.innerText=symbol;

if(!first){

first=card;

}else{

second=card;

lock=true;

moves++;

document.getElementById("moves").innerText=moves;

if(first.dataset.value===second.dataset.value){

first.classList.add("matched");
second.classList.add("matched");

matches++;

updateProgress();

showLoveMessage();

reset();

if(matches===8){

nextLevel();

}

}else{

setTimeout(()=>{

first.innerText="❓";
second.innerText="❓";

reset();

},700);

}

}

};

grid.appendChild(card);

});

}

showPopup1();


/* RESET */

function reset(){

[first,second]=[null,null];

lock=false;

}

/* PROGRESS */

function updateProgress(){

let percent=(matches/8)*100;

document.getElementById("progress").style.width=
percent+"%";

}

/* LOVE MESSAGE */

function showLoveMessage(){

let msg=document.getElementById("msg");

msg.innerText=
loveMessages[
Math.floor(Math.random()*loveMessages.length)
];

}

/* NEXT LEVEL */

function nextLevel(){

if(level===1){

level=2;

matches=0;

document.getElementById("level").innerText=2;

showLevelCompletePopup();

function nextLevel(){

if(level===1){

level=2;

matches=0;

document.getElementById("level").innerText=2;

/* SHOW LEVEL COMPLETE POPUP */

showLevelCompletePopup();

}

else{

winGame();

}

}

}else{

winGame();

}

}


/* WIN GAME */

function winGame(){

clearInterval(timer);

document.getElementById("msg").innerText=
"You unlocked Aalu's heart ❤️";

/* CONFETTI */

for(let i=0;i<50;i++){

let c=document.createElement("div");

c.classList.add("confetti");

c.innerText="🎉";

c.style.left=Math.random()*100+"%";

c.style.animationDuration=
(Math.random()*3+2)+"s";

document.body.appendChild(c);

}

/* FINAL MESSAGE */

// setTimeout(()=>{

// alert("Happy Birthday Aalu ❤️\nYou are my forever love.");

// },2000);

/* OPEN MAIN SITE */

setTimeout(()=>{

location.href="main.html";

},4500);

}

</script>

</body>
</html>
